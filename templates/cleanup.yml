# =============================================================================
# 定时清理 — 删除失败 runs + 过期缓存
# =============================================================================
name: cleanup-actions

on:
  schedule:
    - cron: '0 4 */3 * *'   # 每 3 天 UTC 04:00
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 删除 30 天前的失败 runs
        run: |
          gh api "/repos/${{ github.repository }}/actions/runs?status=failure&per_page=100" \
            | jq -r '.workflow_runs[] | select(.created_at < (now - 30*86400 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -I{} gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/{}" || true

      - name: 🧹 删除 14 天未使用的缓存
        run: |
          gh api "/repos/${{ github.repository }}/actions/caches" \
            | jq -r '.actions_caches[] | select(.last_accessed_at < (now - 14*86400 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -I{} gh api -X DELETE "/repos/${{ github.repository }}/actions/caches/{}" || true