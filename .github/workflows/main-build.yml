# =============================================================================
# 自动构建流水线 — 模板
# 多阶段：检测上游 → 编译构建 → 烟雾测试 → 发布
# =============================================================================
name: auto-build-pipeline

on:
  schedule:
    - cron: '0 6 * * *'    # 每天 UTC 06:00 / 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build
  CCACHE_DIR: /tmp/.ccache
  MAKE_JOBS: 2              # 匹配免费 runner 2 核，非 nproc
  LAST_VERSION_FILE: last_build_version

jobs:
  # ─── Job 1: 检测上游 ─────────────────────────────────────
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      ver_safe: ${{ steps.check.outputs.ver_safe }}
    steps:
      - uses: actions/checkout@v7

      - name: 🔍 检测上游版本
        id: check
        run: |
          SAVED=$(cat ${{ env.LAST_VERSION_FILE }} 2>/dev/null || echo "none")
          LATEST=$(curl -sL "https://api.github.com/repos/<org>/<repo>/releases/latest" \
            | jq -r '.tag_name // empty')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          SAFE="${LATEST#v}"
          echo "ver_safe=$SAFE" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" != "$SAVED" ] && [ -n "$LATEST" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Job 2: 编译构建 ──────────────────────────────────────
  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.check-upstream.outputs.version }}
      ver_safe: ${{ needs.check-upstream.outputs.ver_safe }}
    steps:
      - uses: actions/checkout@v7

      - name: 💾 释放 runner 磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android || true
          df -h

      - name: 📦 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential ccache

      - name: 💾 恢复 ccache 缓存
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ needs.check-upstream.outputs.ver_safe }}-${{ hashFiles('scripts/gen-config.sh') }}
          restore-keys: |
            ccache-${{ needs.check-upstream.outputs.ver_safe }}-
            ccache-

      - name: 💾 恢复源码缓存
        id: source-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.BUILD_DIR }}
          key: source-${{ needs.check-upstream.outputs.ver_safe }}
          restore-keys: |
            source-${{ needs.check-upstream.outputs.ver_safe }}-

      - name: ⬇️ 获取源码（自动重试）
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          TAG="${{ needs.check-upstream.outputs.version }}"
          n=0
          until [ $n -ge 3 ]; do
            rm -rf "${{ env.BUILD_DIR }}"
            git clone --depth 1 --branch "$TAG" \
              https://github.com/<org>/<repo>.git \
              "${{ env.BUILD_DIR }}" && break
            n=$((n+1))
            sleep 30
          done
          [ $n -lt 3 ] || { echo "❌ 克隆失败"; exit 1; }

      - name: ⚙️ 复制自定义文件
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/files"
          cp -r files/* "${{ env.BUILD_DIR }}/files/" 2>/dev/null || true

      - name: ⚙️ 生成配置
        run: |
          bash scripts/gen-config.sh "${{ env.BUILD_DIR }}"

      - name: ⬇️ 下载依赖包（自动重试）
        run: |
          cd "${{ env.BUILD_DIR }}"
          n=0
          until [ $n -ge 3 ]; do
            make download -j${{ env.MAKE_JOBS }} && break
            n=$((n+1))
            sleep 30
          done
          [ $n -lt 3 ] || { echo "❌ download 失败"; exit 1; }

      - name: 🏗️ 编译构建
        run: |
          cd "${{ env.BUILD_DIR }}"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export PATH="/usr/lib/ccache:$PATH"
          make -j${{ env.MAKE_JOBS }} || { echo "⚠️ 失败，verbose 重试…"; make -j1 V=s; }

      - name: 🔏 签名（可选）
        if: false  # 按需启用，需配置 secrets.SIGN_KEY
        env:
          SIGN_KEY: ${{ secrets.SIGN_KEY }}
        run: |
          [ -n "$SIGN_KEY" ] || { echo "⚠️ 无密钥，跳过"; exit 0; }
          echo "🔏 签名中..."
          # 在此添加签名命令

      - name: 📋 产物自检
        run: |
          bash scripts/check-output.sh "${{ env.BUILD_DIR }}"

      - name: 💾 保存版本标识
        run: |
          echo "${{ needs.check-upstream.outputs.version }}" > "${{ env.LAST_VERSION_FILE }}"

      - name: 📤 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ needs.check-upstream.outputs.ver_safe }}
          path: |
            ${{ env.BUILD_DIR }}/output/*.img.gz
            ${{ env.BUILD_DIR }}/output/*.tar.gz
            ${{ env.BUILD_DIR }}/output/sha256sums
          retention-days: 30

  # ─── Job 3: 烟雾测试（可选阻断门）───────────────────────
  smoke-test:
    needs: [check-upstream, build]     # ⚠️ 必须显式列出所有 outputs 来源
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: 📥 下载产物
        uses: actions/download-artifact@v7
        with:
          name: artifact-${{ needs.check-upstream.outputs.ver_safe }}
          path: artifacts/

      - name: 🧪 烟雾测试
        run: |
          echo "🔍 检查产物..."
          ls -lh artifacts/
          # 在此添加自定义烟雾测试逻辑
          echo "✅ 烟雾测试通过"

  # ─── Job 4: 发布 ────────────────────────────────────────
  release:
    needs: [check-upstream, smoke-test]  # ⚠️ 同样需显式依赖
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 📥 下载产物
        uses: actions/download-artifact@v7
        with:
          name: artifact-${{ needs.check-upstream.outputs.ver_safe }}
          path: release-artifacts/

      - name: 🏷️ 生成发布说明
        run: |
          cat > release-body.md << EOF
          ## 🚀 新版本发布

          | 项 | 值 |
          |----|-----|
          | 版本 | ${{ needs.check-upstream.outputs.version }} |
          | 构建时间 | $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间 |
          EOF

      - name: 🚀 发布 Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ needs.check-upstream.outputs.ver_safe }}
          name: v${{ needs.check-upstream.outputs.ver_safe }}
          fail_on_unmatched_files: false
          make_latest: true
          body_path: release-body.md
          files: |
            release-artifacts/*

      - name: 📢 通知
        if: success()
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          VERSION: ${{ needs.check-upstream.outputs.version }}
          BUILD_TIME: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        run: python3 scripts/notify.py