name: cleanup

on:
  schedule:
    - cron: '0 18 */3 * *'   # 每 3 天，UTC 18:00
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 删除 30 天前的失败运行记录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --repo "${{ github.repository }}" --status failure \
            --json databaseId,createdAt --limit 200 \
            --jq '.[] | select(((now - (.createdAt | fromdateiso8601)) / 86400) > 30) | .databaseId' \
          | while read -r id; do
              gh run delete "$id" --repo "${{ github.repository }}" || true
            done

      - name: 🗑️ 清理 14 天未使用的缓存
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --repo "${{ github.repository }}" --json id,key,lastAccessedAt --limit 100 \
            --jq '.[] | select(((now - (.lastAccessedAt | fromdateiso8601)) / 86400) > 14) | .id' \
          | while read -r id; do
              gh cache delete "$id" --repo "${{ github.repository }}" || true
            done